name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version without the leading v
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.release_version }}"
          fi
          if [[ -z "${VERSION}" ]]; then
            echo "Release version is required." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: spring-devtools-ui-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: spring-devtools-ui-ui
        run: npm ci

      - name: Run UI smoke tests
        working-directory: spring-devtools-ui-ui
        run: npm test

      - name: Build UI bundle
        working-directory: spring-devtools-ui-ui
        run: npm run build

      - name: Verify committed UI bundle is fresh
        run: git diff --exit-code -- spring-devtools-ui-ui/dist

      - name: Validate release version
        run: ./gradlew validateReleaseVersion -PreleaseVersion=${{ steps.release.outputs.version }}

      - name: Publish starter to Sonatype
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew --no-configuration-cache publishToSonatype closeAndReleaseSonatypeStagingRepository -PreleaseVersion=${{ steps.release.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: v${{ steps.release.outputs.version }}
