name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: spring-devtools-ui-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: spring-devtools-ui-ui
        run: npm ci

      - name: Run UI smoke tests
        working-directory: spring-devtools-ui-ui
        run: npm test

      - name: Build UI bundle
        working-directory: spring-devtools-ui-ui
        run: npm run build

      - name: Verify committed UI bundle is fresh
        run: git diff --exit-code -- spring-devtools-ui-ui/dist

      - name: Run Gradle build
        run: ./gradlew validateVersioning build
