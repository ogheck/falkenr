name: Compatibility

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  gradle-consumer-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]
        spring-boot: ["3.2.12", "3.3.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: spring-devtools-ui-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: spring-devtools-ui-ui
        run: npm ci

      - name: Run UI smoke tests
        working-directory: spring-devtools-ui-ui
        run: npm test

      - name: Build and verify Gradle consumers
        run: ./gradlew -PspringBootVersion=${{ matrix.spring-boot }} validateVersioning build

  maven-consumer:
    runs-on: ubuntu-latest
    needs: gradle-consumer-matrix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: spring-devtools-ui-ui/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install UI dependencies
        working-directory: spring-devtools-ui-ui
        run: npm ci

      - name: Publish starter to Maven Local
        run: ./gradlew --no-configuration-cache :spring-devtools-ui-core:publishToMavenLocal :spring-devtools-ui-autoconfigure:publishToMavenLocal :spring-devtools-ui-starter:publishToMavenLocal -PreleaseVersion=0.1.0

      - name: Build Maven consumer example
        working-directory: examples/maven-consumer-app
        run: mvn -B -Dspring-devtools-ui.groupId=io.github.ogheck -Dspring-devtools-ui.version=0.1.0 verify
