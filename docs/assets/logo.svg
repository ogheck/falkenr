<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">Falkenr logo</title>
  <desc id="desc">A geometric dashboard mark with the product name.</desc>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="640" height="180" rx="24" fill="#f8fafc"/>
  <g transform="translate(28 28)">
    <rect x="0" y="0" width="124" height="124" rx="24" fill="url(#panel)"/>
    <rect x="18" y="18" width="88" height="18" rx="9" fill="#e2e8f0" opacity="0.95"/>
    <rect x="18" y="48" width="38" height="44" rx="10" fill="#ffffff" opacity="0.98"/>
    <rect x="68" y="48" width="38" height="18" rx="9" fill="#bfdbfe"/>
    <rect x="68" y="74" width="38" height="18" rx="9" fill="#99f6e4"/>
  </g>
  <g fill="#0f172a">
    <text x="178" y="82" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700">
      falkenr
    </text>
    <text x="178" y="118" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#334155">
      Zero-config Spring Boot developer dashboard
    </text>
  </g>
</svg>
